<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe vs AI</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #121212;
            color: #ffffff;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            margin-bottom: 20px;
            color: #4CAF50;
            text-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        select {
            padding: 10px;
            font-size: 1rem;
            background-color: #333;
            color: white;
            border: 1px solid #4CAF50;
            border-radius: 5px;
            outline: none;
        }

        .board {
            display: grid;
            gap: 5px;
            background-color: #333;
            padding: 5px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .cell {
            background-color: #1e1e1e;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .cell:hover {
            background-color: #2a2a2a;
        }

        .cell.x {
            color: #ff5252;
        }

        .cell.o {
            color: #448aff;
        }

        .status {
            margin-top: 20px;
            font-size: 1.5rem;
            font-weight: bold;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>

<body>
    <h1>Tic Tac Toe</h1>
    <div class="controls">
        <label for="modeSelect">Game Mode:</label>
        <select id="modeSelect" onchange="changeMode()">
            <option value="3">3x3</option>
            <option value="5">5x5</option>
            <option value="7">7x7</option>
        </select>
        <button onclick="resetGame()">Restart Game</button>
    </div>
    <div class="board" id="board">
        <!-- Cells generated by JS -->
    </div>
    <div class="status" id="status">Player X's Turn</div>

    <script>
        const statusText = document.getElementById('status');
        let cells = [];
        let board = [];
        let currentPlayer = "X";
        let running = false;
        let size = 3;
        let winLength = 3;
        let winConditions = [];

        function changeMode() {
            size = parseInt(document.getElementById('modeSelect').value);
            winLength = size === 3 ? 3 : (size === 5 ? 4 : 5);
            resetGame();
        }

        function generateBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';

            let cellSize = size === 3 ? '100px' : (size === 5 ? '70px' : '50px');
            let fontSize = size === 3 ? '3rem' : (size === 5 ? '2rem' : '1.5rem');

            boardEl.style.gridTemplateColumns = `repeat(${size}, ${cellSize})`;
            boardEl.style.gridTemplateRows = `repeat(${size}, ${cellSize})`;

            board = new Array(size * size).fill("");
            cells = [];

            for (let i = 0; i < size * size; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.style.fontSize = fontSize;
                cell.setAttribute('data-index', i);
                cell.addEventListener('click', cellClicked);
                boardEl.appendChild(cell);
                cells.push(cell);
            }

            generateWinConditions();
        }

        function generateWinConditions() {
            winConditions = [];
            // horizontal
            for (let r = 0; r < size; r++) {
                for (let c = 0; c <= size - winLength; c++) {
                    let cond = [];
                    for (let i = 0; i < winLength; i++) cond.push(r * size + c + i);
                    winConditions.push(cond);
                }
            }
            // vertical
            for (let c = 0; c < size; c++) {
                for (let r = 0; r <= size - winLength; r++) {
                    let cond = [];
                    for (let i = 0; i < winLength; i++) cond.push((r + i) * size + c);
                    winConditions.push(cond);
                }
            }
            // diagonal right
            for (let r = 0; r <= size - winLength; r++) {
                for (let c = 0; c <= size - winLength; c++) {
                    let cond = [];
                    for (let i = 0; i < winLength; i++) cond.push((r + i) * size + c + i);
                    winConditions.push(cond);
                }
            }
            // diagonal left
            for (let r = 0; r <= size - winLength; r++) {
                for (let c = winLength - 1; c < size; c++) {
                    let cond = [];
                    for (let i = 0; i < winLength; i++) cond.push((r + i) * size + c - i);
                    winConditions.push(cond);
                }
            }
        }

        function initializeGame() {
            generateBoard();
            running = true;
        }

        function cellClicked() {
            const cellIndex = this.getAttribute('data-index');

            if (board[cellIndex] != "" || !running || currentPlayer !== "X") {
                return;
            }

            updateCell(this, cellIndex);
            checkWinner();

            if (running) {
                statusText.textContent = "AI's Turn (Thinking...)";
                // Short timeout to allow UI update before heavy minimax calculation
                setTimeout(aiMove, 50);
            }
        }

        function updateCell(cell, index) {
            board[index] = currentPlayer;
            cell.textContent = currentPlayer;
            cell.classList.add(currentPlayer.toLowerCase());
        }

        function changePlayer() {
            currentPlayer = (currentPlayer == "X") ? "O" : "X";
            if (currentPlayer === "X") {
                statusText.textContent = "Player X's Turn";
            }
        }

        function checkWinner() {
            let roundWon = false;

            for (let i = 0; i < winConditions.length; i++) {
                const condition = winConditions[i];
                let first = board[condition[0]];
                if (first === "") continue;

                let won = true;
                for (let j = 1; j < winLength; j++) {
                    if (board[condition[j]] !== first) {
                        won = false;
                        break;
                    }
                }

                if (won) {
                    roundWon = true;
                    break;
                }
            }

            if (roundWon) {
                statusText.textContent = `${currentPlayer} wins!`;
                running = false;
            } else if (!board.includes("")) {
                statusText.textContent = `Draw!`;
                running = false;
            } else {
                changePlayer();
            }
        }

        function aiMove() {
            if (!running) return;

            let bestScore = -Infinity;
            let move;

            // Optimization: if it's the very first move on a big board, just pick the center
            if (size > 3 && board.filter(c => c !== "").length === 1) {
                let center = Math.floor(size * size / 2);
                if (board[center] === "") {
                    move = center;
                }
            }

            if (move === undefined) {
                // To avoid excessive computation on large boards, use alpha-beta pruning and limit depth
                let maxDepth = size === 3 ? 8 : (size === 5 ? 3 : 2);

                // Prioritize cells near existing moves to speed up search
                let emptyCells = [];
                for (let i = 0; i < board.length; i++) {
                    if (board[i] === "") emptyCells.push(i);
                }

                for (let i = 0; i < emptyCells.length; i++) {
                    let idx = emptyCells[i];
                    board[idx] = "O";
                    let score = minimax(board, 0, false, -Infinity, Infinity, maxDepth);
                    board[idx] = "";
                    if (score > bestScore) {
                        bestScore = score;
                        move = idx;
                    }
                }
            }

            if (move !== undefined) {
                const cell = document.querySelector(`[data-index='${move}']`);
                updateCell(cell, move);
                checkWinner();
            } else {
                // Fallback random move
                let emptyCells = [];
                for (let i = 0; i < board.length; i++) {
                    if (board[i] === "") emptyCells.push(i);
                }
                if (emptyCells.length > 0) {
                    let randIdx = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                    const cell = document.querySelector(`[data-index='${randIdx}']`);
                    updateCell(cell, randIdx);
                    checkWinner();
                }
            }
        }

        function minimax(boardState, depth, isMaximizing, alpha, beta, maxDepth) {
            let result = checkWinState();
            if (result !== null) {
                if (result === 'X') return -100 + depth;
                if (result === 'O') return 100 - depth;
                return 0; // tie
            }

            if (depth >= maxDepth) return 0; // simple heuristic: 0 for unknown

            if (isMaximizing) {
                let bestScore = -Infinity;
                for (let i = 0; i < boardState.length; i++) {
                    if (boardState[i] === "") {
                        boardState[i] = "O";
                        let score = minimax(boardState, depth + 1, false, alpha, beta, maxDepth);
                        boardState[i] = "";
                        bestScore = Math.max(score, bestScore);
                        alpha = Math.max(alpha, score);
                        if (beta <= alpha) break;
                    }
                }
                return bestScore;
            } else {
                let bestScore = Infinity;
                for (let i = 0; i < boardState.length; i++) {
                    if (boardState[i] === "") {
                        boardState[i] = "X";
                        let score = minimax(boardState, depth + 1, true, alpha, beta, maxDepth);
                        boardState[i] = "";
                        bestScore = Math.min(score, bestScore);
                        beta = Math.min(beta, score);
                        if (beta <= alpha) break;
                    }
                }
                return bestScore;
            }
        }

        function checkWinState() {
            for (let i = 0; i < winConditions.length; i++) {
                const condition = winConditions[i];
                let first = board[condition[0]];
                if (first === "") continue;

                let won = true;
                for (let j = 1; j < winLength; j++) {
                    if (board[condition[j]] !== first) {
                        won = false;
                        break;
                    }
                }
                if (won) return first;
            }

            if (!board.includes("")) {
                return "tie";
            }

            return null;
        }

        function resetGame() {
            generateBoard();
            currentPlayer = "X";
            statusText.textContent = `Player X's Turn`;
            running = true;
        }

        initializeGame();
    </script>
</body>

</html>
