<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tic Tac Toe</title>
<meta name="description" content="Tic Tac Toe with 3x3, 5x5, 7x7 and 10x10 boards — play a friend or the computer.">
<link rel="stylesheet" href="./style.css">
</head>
<body>

<main class="stage">
  <header class="masthead">
    <h1 class="wordmark">Tic <span class="dot-x">·</span> Tac <span class="dot-o">·</span> Toe</h1>
    <p class="tagline" id="tagline">Three in a row wins the round.</p>
  </header>

  <nav class="controls" aria-label="Game settings">
    <div class="seg" id="modeSeg" role="group" aria-label="Opponent">
      <button type="button" data-mode="pvp" aria-pressed="true">Two players</button>
      <button type="button" data-mode="cpu" aria-pressed="false">Vs computer</button>
    </div>
    <div class="seg" id="sizeSeg" role="group" aria-label="Board size">
      <button type="button" data-size="3" aria-pressed="true">3×3</button>
      <button type="button" data-size="5" aria-pressed="false">5×5</button>
      <button type="button" data-size="7" aria-pressed="false">7×7</button>
      <button type="button" data-size="10" aria-pressed="false">10×10</button>
    </div>
    <div class="seg hidden" id="diffSeg" role="group" aria-label="Difficulty">
      <button type="button" data-diff="easy" aria-pressed="false">Easy</button>
      <button type="button" data-diff="tricky" aria-pressed="true">Tricky</button>
      <button type="button" data-diff="perfect" aria-pressed="false">Perfect</button>
    </div>
    <div class="seg hidden" id="orderSeg" role="group" aria-label="Who starts">
      <button type="button" data-order="human" aria-pressed="true">You start</button>
      <button type="button" data-order="cpu" aria-pressed="false">Computer starts</button>
    </div>
  </nav>

  <p class="status turn-x" id="status" aria-live="polite"><span class="chip" aria-hidden="true"></span><span id="statusText">X to move</span></p>

  <div class="arena turn-x" id="arena">
    <svg class="hash" id="hash" viewBox="0 0 300 300" aria-hidden="true"></svg>
    <div class="board" id="board" role="grid" aria-label="Tic tac toe board"></div>
    <svg class="strike" id="strike" viewBox="0 0 300 300" aria-hidden="true">
      <line id="strikeLine" x1="0" y1="0" x2="0" y2="0" pathLength="1"></line>
    </svg>
  </div>

  <section class="score" aria-label="Score">
    <div class="tile tx"><div class="num" id="scoreX">0</div><div class="lbl" id="lblX">Player X</div></div>
    <div class="tile td"><div class="num" id="scoreD">0</div><div class="lbl">Draws</div></div>
    <div class="tile to"><div class="num" id="scoreO">0</div><div class="lbl" id="lblO">Player O</div></div>
  </section>

  <div class="actions">
    <button type="button" class="btn primary" id="newRound">New round</button>
    <button type="button" class="btn quiet" id="resetAll">Reset scores</button>
  </div>
</main>

<script src="./script.js"></script>
</body>
</html>
